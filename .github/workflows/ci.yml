name: Ghost CI

on:
  push:
    branches:
      - main
      - 'phase**'
      - 'tier**'
      - 'task**'
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: [self-hosted, linux, x64, ghost-ci]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show environment
        run: |
          node --version
          npm --version
          python3 --version

      - name: Install dependencies
        run: npm install

      - name: Run runtime tests
        run: npx vitest run

      - name: Validate tracker strictly
        run: python3 ops/build-tracker/validate_tracker.py --strict
